<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Nights 6.0</title>
<style>
body,html{margin:0;padding:0;overflow:hidden;background:black;font-family:Arial}
#game{width:100%;height:100%}
#hud{position:absolute;top:10px;left:10px;color:#0f0;font-weight:bold}
#map{position:absolute;bottom:10px;left:10px;width:120px;height:120px;border:2px solid #fff;border-radius:50%;background:#0008}
</style>
</head>
<body>

<div id="hud">💰 <span id="money">0</span></div>
<div id="map"></div>
<div id="game"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
3000
)

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.getElementById("game").appendChild(renderer.domElement)

scene.add(new THREE.AmbientLight(0xffffff,0.4))

let worldSize=1500
let time=0

/* chão */

const floor=new THREE.Mesh(
new THREE.PlaneGeometry(worldSize,worldSize),
new THREE.MeshStandardMaterial({color:0x111111})
)

floor.rotation.x=-Math.PI/2
scene.add(floor)

/* jogador */

const player=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0x3498db})
)

player.position.y=1
scene.add(player)

/* dinheiro */

let money=parseInt(localStorage.getItem("money"))||0
const moneyUI=document.getElementById("money")

function save(){
localStorage.setItem("money",money)
}

/* prédios */

let buildings=[]

for(let i=0;i<200;i++){

let h=20+Math.random()*90

const b=new THREE.Mesh(

new THREE.BoxGeometry(16,h,16),

new THREE.MeshStandardMaterial({
color:0x222222,
emissive:0x000000
})

)

b.position.x=(Math.random()-0.5)*worldSize
b.position.z=(Math.random()-0.5)*worldSize
b.position.y=h/2

scene.add(b)
buildings.push(b)

}

/* NPC andando */

let npcs=[]

for(let i=0;i<40;i++){

const n=new THREE.Mesh(

new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0x777777})

)

n.position.x=(Math.random()-0.5)*600
n.position.z=(Math.random()-0.5)*600
n.position.y=1

scene.add(n)

npcs.push({
mesh:n,
dir:Math.random()*Math.PI*2
})

}

/* carros */

let cars=[]

for(let i=0;i<15;i++){

const c=new THREE.Mesh(
new THREE.BoxGeometry(3,1,6),
new THREE.MeshStandardMaterial({color:0xff0000})
)

c.position.x=(Math.random()-0.5)*600
c.position.z=(Math.random()-0.5)*600
c.position.y=0.5

scene.add(c)

cars.push(c)

}

/* polícia */

let police=[]

function spawnPolice(){

const p=new THREE.Mesh(
new THREE.BoxGeometry(3,1,6),
new THREE.MeshStandardMaterial({color:0xffffff})
)

p.position.copy(player.position)
p.position.x+=50
p.position.z+=50

scene.add(p)

police.push(p)

}

/* chuva */

const rainGeo=new THREE.BufferGeometry()

let rain=[]

for(let i=0;i<3000;i++){

rain.push(
(Math.random()-0.5)*worldSize,
Math.random()*200,
(Math.random()-0.5)*worldSize
)

}

rainGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(rain,3)
)

const rainMat=new THREE.PointsMaterial({
color:0xaaaaaa,
size:0.2
})

const rainSystem=new THREE.Points(rainGeo,rainMat)

scene.add(rainSystem)

/* carro jogador */

let car=new THREE.Mesh(
new THREE.BoxGeometry(3,1,6),
new THREE.MeshStandardMaterial({color:0x00ffcc})
)

car.position.set(10,0.5,10)

scene.add(car)

let inCar=false

/* controles */

const keys={}

window.addEventListener("keydown",e=>keys[e.key]=true)
window.addEventListener("keyup",e=>keys[e.key]=false)

/* tiro */

window.addEventListener("click",()=>{

let ray=new THREE.Raycaster(
player.position,
new THREE.Vector3(0,0,-1)
)

let hits=ray.intersectObjects(npcs.map(n=>n.mesh))

if(hits.length>0){

scene.remove(hits[0].object)

money+=100
moneyUI.innerText=money
save()

spawnPolice()

}

})

/* entrar carro */

window.addEventListener("keydown",e=>{

if(e.key=="e"){

if(player.position.distanceTo(car.position)<6){

inCar=!inCar
player.visible=!inCar

}

}

})

/* update */

function update(){

requestAnimationFrame(update)

/* movimento */

let speed=0.6

if(!inCar){

if(keys["w"]) player.position.z-=speed
if(keys["s"]) player.position.z+=speed
if(keys["a"]) player.position.x-=speed
if(keys["d"]) player.position.x+=speed

}else{

if(keys["w"]) car.position.z-=1.5
if(keys["s"]) car.position.z+=1.5
if(keys["a"]) car.position.x-=1.2
if(keys["d"]) car.position.x+=1.2

player.position.copy(car.position)

}

/* câmera */

camera.position.lerp(
new THREE.Vector3(
player.position.x,
player.position.y+8,
player.position.z+15
),0.1)

camera.lookAt(player.position)

/* NPC andando */

npcs.forEach(n=>{

n.mesh.position.x+=Math.cos(n.dir)*0.1
n.mesh.position.z+=Math.sin(n.dir)*0.1

if(Math.random()<0.01){
n.dir=Math.random()*Math.PI*2
}

})

/* carros andando */

cars.forEach(c=>{

c.position.z+=0.5

if(c.position.z>800) c.position.z=-800

})

/* polícia perseguindo */

police.forEach(p=>{

p.lookAt(player.position)
p.translateZ(0.8)

})

/* chuva */

let pos=rainGeo.attributes.position.array

for(let i=1;i<pos.length;i+=3){

pos[i]-=1

if(pos[i]<0) pos[i]=200

}

rainGeo.attributes.position.needsUpdate=true

/* dia noite */

time+=0.0005

let light=(Math.sin(time)+1)/2

scene.background=new THREE.Color().setHSL(0.6,0.5,light*0.4)

/* luz prédios */

buildings.forEach(b=>{

if(light<0.3){

b.material.emissive.setHex(0xffff66)

}else{

b.material.emissive.setHex(0x000000)

}

})

renderer.render(scene,camera)

}

moneyUI.innerText=money

update()

</script>

</body>
</html>
