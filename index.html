<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Tigrinho Slot</title>

<style>
body {
    background: #0b1220;
    color: white;
    text-align: center;
    font-family: Arial;
}

/* SLOT */
.slot-container {
    display: flex;
    justify-content: center;
    margin-top: 50px;
}

.reel {
    width: 80px;
    height: 120px;
    overflow: hidden;
    border: 2px solid gold;
    margin: 5px;
    border-radius: 10px;
    background: #111;
}

.reel div {
    font-size: 50px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* ANIMAÇÃO */
.spin {
    animation: spin 0.5s linear infinite;
}

@keyframes spin {
    0% { transform: translateY(0); }
    100% { transform: translateY(-120px); }
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    background: orange;
    border: none;
    border-radius: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>🐯 Tigrinho</h1>

<div class="slot-container">
    <div class="reel" id="r1"><div>🐯</div></div>
    <div class="reel" id="r2"><div>🐰</div></div>
    <div class="reel" id="r3"><div>🐂</div></div>
</div>

<button onclick="girar()">GIRAR</button>

<p id="resultado"></p>

<script>
const simbolos = ["🐯","🐰","🐂","🐲","🦁"];

function girar() {
    let reels = ["r1","r2","r3"];

    reels.forEach(id => {
        document.getElementById(id).firstElementChild.classList.add("spin");
    });

    setTimeout(() => {
        reels.forEach(id => {
            let el = document.getElementById(id).firstElementChild;
            el.classList.remove("spin");

            let simbolo = simbolos[Math.floor(Math.random()*simbolos.length)];
            el.innerText = simbolo;
        });

        verificar();
    }, 1500);
}

function verificar() {
    let r1 = document.getElementById("r1").innerText;
    let r2 = document.getElementById("r2").innerText;
    let r3 = document.getElementById("r3").innerText;

    if (r1 === r2 && r2 === r3) {
        document.getElementById("resultado").innerText = "🔥 JACKPOT!";
    } else {
        document.getElementById("resultado").innerText = "❌ Perdeu!";
    }
}
</script>

</body>
</html>
