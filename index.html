<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pixel Battle Royale</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: #111;
    font-family: Arial, sans-serif;
}

canvas {
    display: block;
    background: #2a7a2a;
}

.ui {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
}

.health-bar {
    width: 200px;
    height: 20px;
    background: red;
    margin-top: 5px;
}

.health {
    height: 100%;
    background: lime;
}

.players-left {
    margin-top: 10px;
}
</style>
</head>
<body>

<div class="ui">
    Vida:
    <div class="health-bar">
        <div class="health" id="health"></div>
    </div>
    <div class="players-left" id="playersLeft"></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const keys = {};
const bullets = [];
const bots = [];
let playersLeft = 0;
let stormRadius = 800;
let stormShrink = 0.05;
let gameOver = false;

const player = {
    x: canvas.width/2,
    y: canvas.height/2,
    size: 25,
    speed: 3,
    health: 100,
    maxHealth: 100,
    damage: 15,
    fireRate: 300,
    lastShot: 0
};

function spawnBots(count) {
    for(let i=0;i<count;i++){
        bots.push({
            x: Math.random()*2000-1000,
            y: Math.random()*2000-1000,
            size:25,
            speed:1.5,
            health:50,
            damage:8,
            fireRate:800,
            lastShot:0
        });
    }
    playersLeft = bots.length + 1;
}
spawnBots(10);

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

canvas.addEventListener("mousedown", shoot);

function shoot(e){
    if(Date.now() - player.lastShot > player.fireRate){
        const angle = Math.atan2(
            e.clientY - canvas.height/2,
            e.clientX - canvas.width/2
        );
        bullets.push({
            x: player.x,
            y: player.y,
            dx: Math.cos(angle)*6,
            dy: Math.sin(angle)*6,
            owner: "player"
        });
        player.lastShot = Date.now();
    }
}

function update(){
    if(gameOver) return;

    if(keys["w"]) player.y -= player.speed;
    if(keys["s"]) player.y += player.speed;
    if(keys["a"]) player.x -= player.speed;
    if(keys["d"]) player.x += player.speed;

    // Storm damage
    const distFromCenter = Math.hypot(player.x, player.y);
    if(distFromCenter > stormRadius){
        player.health -= 0.2;
    }

    stormRadius -= stormShrink;

    bullets.forEach((b, i)=>{
        b.x += b.dx;
        b.y += b.dy;

        if(b.owner === "player"){
            bots.forEach((bot, j)=>{
                if(Math.hypot(b.x - bot.x, b.y - bot.y) < bot.size){
                    bot.health -= player.damage;
                    bullets.splice(i,1);
                    if(bot.health <= 0){
                        bots.splice(j,1);
                        playersLeft--;
                        player.damage += 2; // Loot melhora arma
                    }
                }
            });
        } else {
            if(Math.hypot(b.x - player.x, b.y - player.y) < player.size){
                player.health -= 10;
                bullets.splice(i,1);
            }
        }
    });

    bots.forEach(bot=>{
        const angle = Math.atan2(player.y - bot.y, player.x - bot.x);
        bot.x += Math.cos(angle)*bot.speed;
        bot.y += Math.sin(angle)*bot.speed;

        if(Date.now() - bot.lastShot > bot.fireRate){
            bullets.push({
                x: bot.x,
                y: bot.y,
                dx: Math.cos(angle)*4,
                dy: Math.sin(angle)*4,
                owner:"bot"
            });
            bot.lastShot = Date.now();
        }

        if(Math.hypot(bot.x, bot.y) > stormRadius){
            bot.health -= 0.3;
        }
    });

    if(player.health <= 0){
        gameOver = true;
        alert("Você perdeu!");
    }

    if(bots.length === 0){
        gameOver = true;
        alert("Você venceu o Battle Royale!");
    }

    document.getElementById("health").style.width = 
        (player.health/player.maxHealth*100)+"%";

    document.getElementById("playersLeft").innerText =
        "Jogadores restantes: " + playersLeft;
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.save();
    ctx.translate(canvas.width/2 - player.x, canvas.height/2 - player.y);

    // Storm Circle
    ctx.beginPath();
    ctx.arc(0,0,stormRadius,0,Math.PI*2);
    ctx.strokeStyle="blue";
    ctx.lineWidth=5;
    ctx.stroke();

    // Player
    ctx.fillStyle="cyan";
    ctx.fillRect(player.x-player.size/2,player.y-player.size/2,
                 player.size,player.size);

    // Bots
    ctx.fillStyle="red";
    bots.forEach(bot=>{
        ctx.fillRect(bot.x-bot.size/2,bot.y-bot.size/2,
                     bot.size,bot.size);
    });

    // Bullets
    ctx.fillStyle="yellow";
    bullets.forEach(b=>{
        ctx.fillRect(b.x-3,b.y-3,6,6);
    });

    ctx.restore();
}

function gameLoop(){
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
