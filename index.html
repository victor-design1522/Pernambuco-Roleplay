<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Battle Royale 2D</title>
<style>
body{margin:0;overflow:hidden;background:#111;font-family:Arial;touch-action:none;}
canvas{display:block;background:#1b1b1b;}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();
window.addEventListener("resize",resize);

/* WORLD */
const world={width:5000,height:5000};
let camera={x:0,y:0};

/* GAME */
let gameState="menu";
let startTime=0;
let safeZone={x:world.width/2,y:world.height/2,r:world.width/2-200};
let safeShrinkTimer=0;

/* PLAYER */
const player={
  x:2500,y:2500,r:20,speed:3,
  life:100,maxLife:100,
  xp:0,level:1,color:"cyan",
  weapon:{name:"Pistol",dmg:20,speed:7}
};

let bullets=[],enemies=[],explosions=[],loots=[];
let score=0,spawnTimer=0,dmgFlash=0;

/* JOYSTICK */
let joystick={active:false,x:100,y:canvas.height-120,dx:0,dy:0};

/* UTILS */
function dist(a,b,c,d){return Math.hypot(a-c,b-d);}
function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

/* SPAWN ENEMY/BOT */
function spawnEnemy(){
let x=Math.random()*world.width;
let y=Math.random()*world.height;
enemies.push({
  x,y,r:18,life:30+player.level*5,speed:1.2+player.level*0.1,
  weapon:{name:"Pistol",dmg:15,speed:5}
});
}

/* SPAWN LOOT */
function spawnLoot(){
let x=Math.random()*world.width;
let y=Math.random()*world.height;
let type=Math.random()<0.5?"life":"rifle";
loots.push({x,y,type,r:10});
}

/* AUTO AIM FOR PLAYER */
function shootAuto(){
if(enemies.length===0)return;
let closest=null,minDist=Infinity;
for(let e of enemies){
let d=dist(player.x,player.y,e.x,e.y);
if(d<minDist){minDist=d;closest=e;}
}
if(!closest)return;
let angle=Math.atan2(closest.y-player.y,closest.x-player.x);
let speed=player.weapon.speed;
bullets.push({x:player.x,y:player.y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,dmg:player.weapon.dmg,owner:"player"});
}

/* BOT SHOOT */
function botShoot(bot){
let angle=Math.atan2(player.y-bot.y,player.x-bot.x);
let speed=bot.weapon.speed;
bullets.push({x:bot.x,y:bot.y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,dmg:bot.weapon.dmg,owner:"bot"});
}

/* UPDATE */
function update(){
if(gameState!=="playing")return;

/* movement */
player.x+=joystick.dx*player.speed;
player.y+=joystick.dy*player.speed;

/* world limit */
player.x=Math.max(player.r,Math.min(world.width-player.r,player.x));
player.y=Math.max(player.r,Math.min(world.height-player.r,player.y));

/* camera follow */
camera.x=player.x-canvas.width/2;
camera.y=player.y-canvas.height/2;
camera.x=Math.max(0,Math.min(world.width-canvas.width,camera.x));
camera.y=Math.max(0,Math.min(world.height-canvas.height,camera.y));

/* spawn enemies & loot */
spawnTimer++;
if(spawnTimer>200 && enemies.length<30){spawnEnemy();spawnTimer=0;}
if(spawnTimer%500===0){spawnLoot();}

/* bullets movement */
for(let i=bullets.length-1;i>=0;i--){
let b=bullets[i];
b.x+=b.vx;b.y+=b.vy;
if(b.x<0||b.x>world.width||b.y<0||b.y>world.height){bullets.splice(i,1);continue;}

/* collisions */
if(b.owner==="player"){
for(let j=enemies.length-1;j>=0;j--){
let e=enemies[j];
if(dist(b.x,b.y,e.x,e.y)<e.r+5){
e.life-=b.dmg;bullets.splice(i,1);
if(e.life<=0){score+=10;player.xp+=10;explosions.push({x:e.x,y:e.y,t:20});enemies.splice(j,1);}
break;
}
}
}else{
if(dist(b.x,b.y,player.x,player.y)<player.r+5){player.life-=b.dmg;bullets.splice(i,1);dmgFlash=5;}
}
}

/* enemies AI */
for(let e of enemies){
let angle=Math.atan2(player.y-e.y,player.x-e.x);
let distToPlayer=dist(e.x,e.y,player.x,player.y);

/* movement */
if(distToPlayer>150){ // move closer
e.x+=Math.cos(angle)*e.speed;
e.y+=Math.sin(angle)*e.speed;
}else if(distToPlayer<50){ // keep distance
e.x-=Math.cos(angle)*e.speed;
e.y-=Math.sin(angle)*e.speed;
}

/* bot shoot */
if(Math.random()<0.01)botShoot(e);

/* collision with player */
if(dist(e.x,e.y,player.x,player.y)<e.r+player.r){
player.life-=0.5;dmgFlash=5;
if(player.life<=0)gameState="gameover";
}
}

/* pick loot */
for(let i=loots.length-1;i>=0;i--){
let l=loots[i];
if(dist(player.x,player.y,l.x,l.y)<player.r+l.r){
if(l.type==="life"){player.life=Math.min(player.maxLife,player.life+30);}
else if(l.type==="rifle"){player.weapon={name:"Rifle",dmg:35,speed:6};}
loots.splice(i,1);
}
}

/* explosions */
for(let i=explosions.length-1;i>=0;i--){explosions[i].t--;if(explosions[i].t<=0)explosions.splice(i,1);}

/* level up */
if(player.xp>=100){player.level++;player.xp=0;player.maxLife+=20;player.life=player.maxLife;}

/* safe zone shrink */
safeShrinkTimer++;
if(safeShrinkTimer>300){
safeZone.r=Math.max(50,safeZone.r-10);safeShrinkTimer=0;
}

/* damage outside safe zone */
let d=dist(player.x,player.y,safeZone.x,safeZone.y);
if(d>safeZone.r){player.life-=0.3;dmgFlash=3;}
}

/* DRAW */
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

/* damage flash */
if(dmgFlash>0){ctx.fillStyle="rgba(255,0,0,0.3)";ctx.fillRect(0,0,canvas.width,canvas.height); dmgFlash--}

/* MENU */
if(gameState==="menu"){
ctx.fillStyle="white";ctx.font="40px Arial";ctx.textAlign="center";
ctx.fillText("BATTLE ROYALE 2D",canvas.width/2,200);
ctx.fillText("TOQUE PARA JOGAR",canvas.width/2,300);
return;
}

/* GAME OVER */
if(gameState==="gameover"){
ctx.fillStyle="red";ctx.font="50px Arial";ctx.textAlign="center";
ctx.fillText("GAME OVER",canvas.width/2,250);
ctx.fillStyle="white";ctx.fillText("Score: "+score,canvas.width/2,320);
return;
}

/* GRID */
ctx.strokeStyle="#222";
for(let x=0;x<world.width;x+=200){ctx.beginPath();ctx.moveTo(x-camera.x,0-camera.y);ctx.lineTo(x-camera.x,world.height-camera.y);ctx.stroke();}
for(let y=0;y<world.height;y+=200){ctx.beginPath();ctx.moveTo(0-camera.x,y-camera.y);ctx.lineTo(world.width-camera.x,y-camera.y);ctx.stroke();}

/* SAFE ZONE */
ctx.strokeStyle="lime";ctx.lineWidth=3;
ctx.beginPath();ctx.arc(safeZone.x-camera.x,safeZone.y-camera.y,safeZone.r,0,Math.PI*2);ctx.stroke();
ctx.lineWidth=1;

/* LOOT */
for(let l of loots){
ctx.fillStyle=l.type==="life"?"lime":"blue";
ctx.beginPath();ctx.arc(l.x-camera.x,l.y-camera.y,l.r,0,Math.PI*2);ctx.fill();
}

/* PLAYER */
ctx.fillStyle=player.color;
ctx.beginPath();
ctx.arc(player.x-camera.x,player.y-camera.y,player.r,0,Math.PI*2);
ctx.fill();

/* BULLETS */
ctx.fillStyle="yellow";
for(let b of bullets){ctx.beginPath();ctx.arc(b.x-camera.x,b.y-camera.y,5,0,Math.PI*2);ctx.fill();}

/* ENEMIES */
ctx.fillStyle="red";
for(let e of enemies){ctx.beginPath();ctx.arc(e.x-camera.x,e.y-camera.y,e.r,0,Math.PI*2);ctx.fill();}

/* EXPLOSIONS */
ctx.fillStyle="orange";
for(let ex of explosions){ctx.beginPath();ctx.arc(ex.x-camera.x,ex.y-camera.y,ex.t,0,Math.PI*2);ctx.fill();}

/* HUD */
ctx.fillStyle="white";ctx.font="18px Arial";
ctx.fillText("Score: "+score,20,25);
ctx.fillText("Tempo: "+Math.floor((Date.now()-startTime)/1000)+"s",20,50);
ctx.fillText("Vivos: "+(enemies.length+1),20,75);

/* Life bar */
ctx.fillRect(20,90,200,12);ctx.fillStyle="lime";
ctx.fillRect(20,90,200*(player.life/player.maxLife),12);

/* XP BAR */
ctx.fillStyle="#333";ctx.fillRect(canvas.width/2-150,20,300,15);
ctx.fillStyle="cyan";ctx.fillRect(canvas.width/2-150,20,300*(player.xp/100),15);

/* LEVEL */
ctx.fillStyle="white";ctx.font="28px Arial";
ctx.fillText("LVL "+player.level,canvas.width/2-40,60);

/* MINI MAP */
let mapSize=120,mapX=canvas.width-mapSize-15,mapY=15;
ctx.fillStyle="black";ctx.fillRect(mapX,mapY,mapSize,mapSize);
ctx.strokeStyle="white";ctx.strokeRect(mapX,mapY,mapSize,mapSize);

/* player dot */
ctx.fillStyle="cyan";ctx.fillRect(mapX+(player.x/world.width)*mapSize-3,mapY+(player.y/world.height)*mapSize-3,6,6);

/* enemy dots */
ctx.fillStyle="red";
for(let e of enemies){ctx.fillRect(mapX+(e.x/world.width)*mapSize-2,mapY+(e.y/world.height)*mapSize-2,4,4);}

/* safe zone dot */
ctx.strokeStyle="lime";ctx.lineWidth=2;
ctx.beginPath();ctx.arc(mapX+(safeZone.x/world.width)*mapSize,mapY+(safeZone.y/world.height)*mapSize,(safeZone.r/world.width)*mapSize,0,Math.PI*2);ctx.stroke();
ctx.lineWidth=1;

/* joystick */
ctx.strokeStyle="white";ctx.beginPath();ctx.arc(joystick.x,joystick.y,50,0,Math.PI*2);ctx.stroke();
}

/* LOOP */
function loop(){update();draw();requestAnimationFrame(loop);}
loop();

/* TOUCH */
canvas.addEventListener("touchstart",e=>{
let t=e.touches[0];
if(gameState==="menu"){gameState="playing";startTime=Date.now();return;}
if(gameState==="gameover"){location.reload();}
if(dist(t.clientX,t.clientY,joystick.x,joystick.y)<60){joystick.active=true;}
});
canvas.addEventListener("touchmove",e=>{
if(!joystick.active)return;
let t=e.touches[0];let dx=t.clientX-joystick.x;let dy=t.clientY-joystick.y;
let mag=Math.hypot(dx,dy);
if(mag>0){joystick.dx=dx/mag;joystick.dy=dy/mag;}
});
canvas.addEventListener("touchend",()=>{joystick.active=false;joystick.dx=0;joystick.dy=0;});

/* AUTO SHOOT */
setInterval(()=>{if(gameState==="playing")shootAuto();},400);

</script>
</body>
</html>
