<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open World Test</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}
</style>

</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// CENA
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// CAMERA
const camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);

// RENDER
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// LUZ
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

// CHÃO
const textureLoader = new THREE.TextureLoader();

const groundTexture = textureLoader.load("https://threejs.org/examples/textures/terrain/grasslight-big.jpg");

groundTexture.wrapS = THREE.RepeatWrapping;
groundTexture.wrapT = THREE.RepeatWrapping;
groundTexture.repeat.set(20,20);

const groundGeo = new THREE.PlaneGeometry(200,200);

const groundMat = new THREE.MeshStandardMaterial({
map:groundTexture
});

const ground = new THREE.Mesh(groundGeo,groundMat);
ground.rotation.x = -Math.PI/2;

scene.add(ground);

// PRÉDIOS
const buildings = [];

const buildingTexture = textureLoader.load("https://threejs.org/examples/textures/brick_diffuse.jpg");

for(let i=0;i<40;i++){

const geo = new THREE.BoxGeometry(1,1,1);

const mat = new THREE.MeshStandardMaterial({
map:buildingTexture
});

const building = new THREE.Mesh(geo,mat);

building.scale.set(
Math.random()*5+2,
Math.random()*15+5,
Math.random()*5+2
);

building.position.set(
(Math.random()-0.5)*150,
building.scale.y/2,
(Math.random()-0.5)*150
);

scene.add(building);

buildings.push(building);

}

// PLAYER
const playerGeo = new THREE.BoxGeometry(1,2,1);

const playerMat = new THREE.MeshStandardMaterial({
color:0xff0000
});

const player = new THREE.Mesh(playerGeo,playerMat);

player.position.y = 1;

scene.add(player);

// CARROS
const cars = [];

for(let i=0;i<10;i++){

const geo = new THREE.BoxGeometry(2,1,4);

const mat = new THREE.MeshStandardMaterial({
color:0xff0000
});

const car = new THREE.Mesh(geo,mat);

car.position.set(
(Math.random()-0.5)*80,
0.5,
(Math.random()-0.5)*80
);

scene.add(car);

cars.push(car);

}

// NPC
const npcs = [];

for(let i=0;i<8;i++){

const geo = new THREE.BoxGeometry(1,2,1);

const mat = new THREE.MeshStandardMaterial({
color:0x00ff00
});

const npc = new THREE.Mesh(geo,mat);

npc.position.set(
(Math.random()-0.5)*60,
1,
(Math.random()-0.5)*60
);

scene.add(npc);

npcs.push(npc);

}

// CAMERA
camera.position.set(0,5,8);

// CONTROLE
let speed = 0.3;

document.addEventListener("keydown",(e)=>{

if(e.key=="w") player.position.z -= speed;

if(e.key=="s") player.position.z += speed;

if(e.key=="a") player.position.x -= speed;

if(e.key=="d") player.position.x += speed;

});

// LOOP
function animate(){

requestAnimationFrame(animate);

// NPC andando
npcs.forEach(npc=>{
npc.position.x += (Math.random()-0.5)*0.1;
npc.position.z += (Math.random()-0.5)*0.1;
});

// CAMERA SEGUE PLAYER
camera.position.x = player.position.x;
camera.position.z = player.position.z + 8;

camera.lookAt(player.position);

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
