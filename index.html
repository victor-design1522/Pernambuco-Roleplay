<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GTA Mobile V3 - City Lights</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; touch-action: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* UI de Menu */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.8); color: white; text-align: center; }
        h1 { color: #f1c40f; font-size: 3rem; margin-bottom: 10px; }
        button { padding: 15px 40px; font-size: 1.2rem; background: #27ae60; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .hidden { display: none !important; }

        /* HUD */
        #hud { position: absolute; top: 15px; left: 15px; z-index: 10; pointer-events: none; color: white; }
        .bar { width: 150px; height: 12px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 6px; margin-bottom: 5px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: #2ecc71; transition: 0.3s; }
        #ammo-ui, #money-ui { font-weight: bold; text-shadow: 2px 2px 2px #000; font-size: 1.2rem; }

        /* Controles */
        #controls { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; }
        .joy-zone { position: absolute; width: 50%; height: 60%; bottom: 0; pointer-events: auto; }
        #left-zone { left: 0; } #right-zone { right: 0; }
        .stick-base { position: absolute; width: 80px; height: 80px; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; transform: translate(-50%, -50%); display: none; }
        .stick-tip { position: absolute; width: 40px; height: 40px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.6; }
        
        .btn { position: absolute; width: 65px; height: 65px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; pointer-events: auto; display: flex; justify-content: center; align-items: center; color: white; font-size: 24px; }
        #btn-shoot { bottom: 100px; right: 20px; background: rgba(231, 76, 60, 0.6); }
        #btn-v { bottom: 20px; left: 20px; background: rgba(46, 204, 113, 0.6); display: none; }
    </style>
</head>
<body>

    <div id="menu" class="overlay">
        <h1>CITY NIGHTS</h1>
        <p style="margin-bottom: 20px;">Use o lado esquerdo para andar e o direito para olhar.</p>
        <button onclick="start()">INICIAR JOGO</button>
    </div>

    <div id="hud" class="hidden">
        <div class="bar"><div id="hp-fill"></div></div>
        <div id="ammo-ui">🔫 30 / 30</div>
        <div id="money-ui">💰 $ 0</div>
    </div>

    <div id="controls" class="hidden">
        <div id="left-zone" class="joy-zone"><div class="stick-base" id="joy-l"><div class="stick-tip"></div></div></div>
        <div id="right-zone" class="joy-zone"><div class="stick-base" id="joy-r"><div class="stick-tip"></div></div></div>
        <div id="btn-shoot" class="btn">💥</div>
        <div id="btn-v" class="btn">🚗</div>
    </div>

    <div id="game-canvas"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- CONFIG ---
        const worldSize = 300;
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.shadowMap.enabled = true;
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('game-canvas').appendChild(renderer.domElement);

        // --- ILUMINAÇÃO ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(50, 100, 50);
        sun.castShadow = true;
        scene.add(sun);

        // --- MUNDO E PISTAS ---
        function createWorld() {
            // Grama/Base
            const groundGeo = new THREE.PlaneGeometry(worldSize, worldSize);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI/2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Criar Ruas (Cruzamento em X e Y)
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const roadNS = new THREE.Mesh(new THREE.PlaneGeometry(20, worldSize), roadMat);
            roadNS.rotation.x = -Math.PI/2;
            roadNS.position.y = 0.01;
            scene.add(roadNS);

            const roadEW = new THREE.Mesh(new THREE.PlaneGeometry(worldSize, 20), roadMat);
            roadEW.rotation.x = -Math.PI/2;
            roadEW.position.y = 0.01;
            scene.add(roadEW);

            // Prédios e Postes
            for (let i = 0; i < 60; i++) {
                let x = (Math.random() - 0.5) * (worldSize - 40);
                let z = (Math.random() - 0.5) * (worldSize - 40);
                
                // Evitar prédios no meio da rua
                if (Math.abs(x) < 15 || Math.abs(z) < 15) x += 30;

                const h = 10 + Math.random() * 20;
                const bGeo = new THREE.BoxGeometry(8, h, 8);
                // Material com emissão (janelas)
                const bMat = new THREE.MeshStandardMaterial({ 
                    color: 0x444444, 
                    emissive: 0xffaa00, 
                    emissiveIntensity: 0 
                });
                const b = new THREE.Mesh(bGeo, bMat);
                b.position.set(x, h/2, z);
                b.castShadow = true;
                b.receiveShadow = true;
                b.userData.isBuilding = true;
                scene.add(b);
                buildings.push(b);

                // Adicionar um poste de luz perto do prédio
                if (i % 3 === 0) createStreetLight(x + 6, z + 6);
            }
        }

        const streetLights = [];
        function createStreetLight(x, z) {
            const group = new THREE.Group();
            // Poste
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.2, 6), new THREE.MeshStandardMaterial({color: 0x333333}));
            pole.position.y = 3;
            group.add(pole);

            // Lâmpada
            const bulb = new THREE.PointLight(0xffcc00, 0, 15);
            bulb.position.set(0, 6, 0);
            group.add(bulb);
            
            const bulbMesh = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshBasicMaterial({color: 0x333333}));
            bulbMesh.position.set(0, 6, 0);
            group.add(bulbMesh);

            group.position.set(x, 0, z);
            scene.add(group);
            streetLights.push({ light: bulb, mesh: bulbMesh });
        }

        // --- PLAYER ---
        const player = {
            mesh: null,
            hp: 100,
            ammo: 30,
            rotY: 0,
            pitch: 0,
            vel: new THREE.Vector3(),
            init() {
                this.mesh = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0x3498db}));
                this.mesh.position.y = 1;
                this.mesh.castShadow = true;
                scene.add(this.mesh);
            }
        };

        const car = {
            mesh: null,
            speed: 0,
            active: false,
            init() {
                this.mesh = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 4), new THREE.MeshStandardMaterial({color: 0x27ae60}));
                this.mesh.position.set(10, 0.5, 10);
                scene.add(this.mesh);
            }
        };

        const buildings = [];
        const npcs = [];

        function createNPC() {
            const n = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0xe74c3c}));
            n.position.set((Math.random()-0.5)*100, 1, (Math.random()-0.5)*100);
            scene.add(n);
            npcs.push({ mesh: n, health: 100 });
        }

        // --- CONTROLES TOUCH ---
        const inputs = { move: {x:0, y:0}, look: {x:0, y:0} };
        function setupJoystick(id, type) {
            const zone = document.getElementById(id);
            const joy = zone.querySelector('.stick-base');
            let tId = null;
            let startX, startY;

            zone.addEventListener('touchstart', e => {
                const t = e.changedTouches[0];
                tId = t.identifier;
                startX = t.clientX; startY = t.clientY;
                joy.style.display = 'block';
                joy.style.left = startX + 'px'; joy.style.top = startY + 'px';
            });

            zone.addEventListener('touchmove', e => {
                for(let t of e.changedTouches) {
                    if(t.identifier === tId) {
                        let dx = (t.clientX - startX) / 40;
                        let dy = (t.clientY - startY) / 40;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        if(dist > 1) { dx/=dist; dy/=dist; }
                        inputs[type].x = dx; inputs[type].y = dy;
                    }
                }
            });

            zone.addEventListener('touchend', e => {
                for(let t of e.changedTouches) {
                    if(t.identifier === tId) {
                        tId = null; joy.style.display = 'none';
                        inputs[type].x = 0; inputs[type].y = 0;
                    }
                }
            });
        }

        // --- GAME LOOP ---
        let dayTime = 0;
        let clock = new THREE.Clock();

        function update() {
            let delta = clock.getDelta();
            
            // Ciclo Dia/Noite (Muito mais devagar)
            dayTime += delta * 0.05; 
            let sunInt = Math.sin(dayTime * 0.5) + 0.5; // 0 a 1
            sun.intensity = Math.max(0.1, sunInt);
            ambient.intensity = Math.max(0.1, sunInt * 0.5);
            
            // Lógica de Noite
            const isNight = sunInt < 0.3;
            scene.background = new THREE.Color().setHSL(0.6, 0.5, sunInt * 0.5);
            
            streetLights.forEach(sl => {
                sl.light.intensity = isNight ? 1.5 : 0;
                sl.mesh.material.color.setHex(isNight ? 0xffffff : 0x333333);
            });

            buildings.forEach(b => {
                b.material.emissiveIntensity = isNight ? 1 : 0;
            });

            if (!car.active) {
                // Movimentação Player
                player.rotY -= inputs.look.x * 0.05;
                player.pitch = Math.max(-1, Math.min(1, player.pitch - inputs.look.y * 0.05));
                player.mesh.rotation.y = player.rotY;

                const moveDir = new THREE.Vector3(inputs.move.x, 0, inputs.move.y).applyAxisAngle(new THREE.Vector3(0,1,0), player.rotY);
                player.mesh.position.add(moveDir.multiplyScalar(0.2));

                // Camera TPS
                const camPos = player.mesh.position.clone().add(new THREE.Vector3(0, 3, 6).applyAxisAngle(new THREE.Vector3(0,1,0), player.rotY));
                camera.position.lerp(camPos, 0.1);
                camera.lookAt(player.mesh.position.clone().add(new THREE.Vector3(0, 1.5, 0)));

                // Checar carro próximo
                let d = player.mesh.position.distanceTo(car.mesh.position);
                document.getElementById('btn-v').style.display = d < 5 ? 'flex' : 'none';
            } else {
                // Direção Carro
                car.speed = THREE.MathUtils.lerp(car.speed, -inputs.move.y * 0.6, 0.1);
                car.mesh.rotation.y -= inputs.move.x * 0.05 * (car.speed > 0 ? 1 : -1);
                car.mesh.translateZ(car.speed);

                // Camera Carro
                const camPos = car.mesh.position.clone().add(new THREE.Vector3(0, 5, 10).applyAxisAngle(new THREE.Vector3(0,1,0), car.mesh.rotation.y));
                camera.position.lerp(camPos, 0.1);
                camera.lookAt(car.mesh.position);
            }

            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }

        // --- SISTEMAS ---
        function start() {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('controls').classList.remove('hidden');
            
            createWorld();
            player.init();
            car.init();
            for(let i=0; i<5; i++) createNPC();
            
            setupJoystick('left-zone', 'move');
            setupJoystick('right-zone', 'look');
            
            update();
        }

        document.getElementById('btn-v').addEventListener('touchstart', () => {
            car.active = !car.active;
            player.mesh.visible = !car.active;
            if(!car.active) player.mesh.position.copy(car.mesh.position).add(new THREE.Vector3(3,1,0));
        });

        document.getElementById('btn-shoot').addEventListener('touchstart', () => {
            if(player.ammo > 0) {
                player.ammo--;
                document.getElementById('ammo-ui').innerText = `🔫 ${player.ammo} / 30`;
                // Raycast simples para tiro
                const ray = new THREE.Raycaster(player.mesh.position, new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), player.rotY));
                const hits = ray.intersectObjects(npcs.map(n => n.mesh));
                if(hits.length > 0) {
                    hits[0].object.position.y = -5; // NPC morre (some)
                    let m = parseInt(document.getElementById('money-ui').innerText.replace(/\D/g,'')) + 100;
                    document.getElementById('money-ui').innerText = `💰 $ ${m}`;
                }
            }
        });

    </script>
</body>
</html>
