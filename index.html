<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Top Cassino BR</title>
<style>
    body {
        font-family: Arial;
        background: #0f172a;
        color: white;
        text-align: center;
    }

    .box {
        background: #1e293b;
        padding: 20px;
        margin: 30px auto;
        width: 320px;
        border-radius: 10px;
    }

    button {
        padding: 10px;
        margin: 5px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        background: #f59e0b;
        color: white;
    }

    button:hover {
        background: #d97706;
    }

    .slot {
        font-size: 50px;
        margin: 10px;
    }
</style>
</head>

<body>

<h1>🎰 Top Cassino BR</h1>

<div class="box">
    <p>Saldo: R$ <span id="saldo">100</span></p>

    <div class="slot" id="slot">🐯 🐰 🐂</div>

    <button onclick="girar()">GIRAR</button>

    <p id="resultado"></p>
</div>

<script>
let saldo = 100;
const simbolos = ["🐯","🐰","🐂","🐵","🐼","🦁"];

function girar() {
    if (saldo <= 0) {
        alert("Sem saldo!");
        saldo = 100;
    }

    saldo -= 10;

    let s1 = simbolos[Math.floor(Math.random() * simbolos.length)];
    let s2 = simbolos[Math.floor(Math.random() * simbolos.length)];
    let s3 = simbolos[Math.floor(Math.random() * simbolos.length)];

    document.getElementById("slot").innerText = `${s1} ${s2} ${s3}`;

    if (s1 === s2 && s2 === s3) {
        saldo += 100;
        document.getElementById("resultado").innerText = "🔥 JACKPOT! +100";
    } else if (s1 === s2 || s2 === s3 || s1 === s3) {
        saldo += 20;
        document.getElementById("resultado").innerText = "✨ Quase! +20";
    } else {
        document.getElementById("resultado").innerText = "❌ Perdeu!";
    }

    document.getElementById("saldo").innerText = saldo;
}
</script>

</body>
</html>
