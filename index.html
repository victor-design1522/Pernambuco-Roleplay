<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mod Menu</title>
<style>
body {
    margin: 0;
    background: #0d0d0d;
    font-family: Arial;
    color: white;
}

.menu {
    width: 300px;
    background: #1a1a1a;
    border-radius: 15px;
    padding: 15px;
    margin: 50px auto;
    box-shadow: 0 0 20px red;
}

h2 {
    text-align: center;
    color: red;
}

.option {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
}

button {
    background: red;
    border: none;
    padding: 5px 10px;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button.active {
    background: limegreen;
}

.slider {
    width: 100%;
}
</style>
</head>

<body>

<div class="menu">
    <h2>MOD MENU</h2>

    <div class="option">
        <span>Aimbot</span>
        <button onclick="toggle(this)">OFF</button>
    </div>

    <div class="option">
        <span>Wallhack</span>
        <button onclick="toggle(this)">OFF</button>
    </div>

    <div class="option">
        <span>Speed</span>
        <button onclick="toggle(this)">OFF</button>
    </div>

    <div class="option">
        <span>FPS Boost</span>
        <button onclick="toggle(this)">OFF</button>
    </div>

    <p>Velocidade:</p>
    <input type="range" min="1" max="100" class="slider">

</div>

<script>
function toggle(btn) {
    if (btn.classList.contains("active")) {
        btn.classList.remove("active");
        btn.innerText = "OFF";
    } else {
        btn.classList.add("active");
        btn.innerText = "ON";
    }
}
</script>

</body>
</html>
