<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>City Evolution - Open World</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;touch-action:none}
body{overflow:hidden;background:#000;font-family:sans-serif}
#game{position:absolute;width:100%;height:100%}
#menu{
position:absolute;width:100%;height:100%;
display:flex;flex-direction:column;justify-content:center;align-items:center;
background:linear-gradient(#111,#222);color:#fff;z-index:10}
#menu h1{font-size:3rem;color:#f1c40f}
#menu button{
margin-top:20px;padding:15px 40px;font-size:1.5rem;
background:#e74c3c;border:none;border-radius:10px;color:#fff}

#hud{position:absolute;top:20px;left:20px;color:#fff;display:none;z-index:5}
.bar{width:150px;height:12px;background:#333;border:2px solid #fff;border-radius:6px;overflow:hidden}
#hp{height:100%;width:100%;background:#2ecc71}

#controls{position:absolute;width:100%;height:100%;z-index:5;display:none}
.zone{position:absolute;width:50%;height:50%;bottom:0}
#left{left:0}#right{right:0}
.btn{
position:absolute;width:70px;height:70px;border-radius:50%;
background:rgba(0,0,0,0.5);color:#fff;
display:flex;justify-content:center;align-items:center;
border:2px solid #fff;font-size:25px}
#shoot{bottom:100px;right:30px;background:rgba(231,76,60,0.7)}
#jump{bottom:20px;right:110px;background:rgba(52,152,219,0.7)}
</style>
</head>

<body>

<div id="menu">
<h1>CITY EVOLUTION</h1>
<button onclick="startGame()">INICIAR</button>
</div>

<div id="hud">
<div class="bar"><div id="hp"></div></div>
<div id="ammo">🔫 999</div>
<div id="wanted">🚨 0</div>
</div>

<div id="controls">
<div id="left" class="zone"></div>
<div id="right" class="zone"></div>
<div id="shoot" class="btn">💥</div>
<div id="jump" class="btn">⬆️</div>
</div>

<div id="game"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene,camera,renderer;
let player={mesh:null,rot:0,hp:100,vY:0,jump:false};
let bullets=[],npcs=[],wanted=0;
let input={mx:0,my:0,lx:0,ly:0};
let clock=new THREE.Clock();

function init(){
scene=new THREE.Scene();
camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));
renderer.setSize(innerWidth,innerHeight);
document.getElementById("game").appendChild(renderer.domElement);

scene.background=new THREE.Color(0x87ceeb);
scene.add(new THREE.AmbientLight(0xffffff,0.6));
let sun=new THREE.DirectionalLight(0xffffff,0.6);
sun.position.set(50,100,50);
scene.add(sun);

let ground=new THREE.Mesh(
new THREE.PlaneGeometry(400,400),
new THREE.MeshStandardMaterial({color:0x228B22})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

for(let i=0;i<60;i++){
let h=5+Math.random()*20;
let b=new THREE.Mesh(
new THREE.BoxGeometry(10,h,10),
new THREE.MeshStandardMaterial({color:0x444444})
);
b.position.set((Math.random()-0.5)*300,h/2,(Math.random()-0.5)*300);
scene.add(b);
}

player.mesh=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0x3498db})
);
player.mesh.position.y=1;
scene.add(player.mesh);

for(let i=0;i<20;i++)spawnNPC();

animate();
}

function spawnNPC(){
let n=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xe74c3c})
);
n.position.set((Math.random()-0.5)*200,1,(Math.random()-0.5)*200);
scene.add(n);
npcs.push(n);
}

function shoot(){
let geo=new THREE.SphereGeometry(0.2);
let mat=new THREE.MeshBasicMaterial({color:0xffff00});
let b=new THREE.Mesh(geo,mat);
b.position.copy(player.mesh.position);
let dir=new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0),player.rot);
scene.add(b);
bullets.push({mesh:b,dir:dir});
}

function animate(){
requestAnimationFrame(animate);
let delta=clock.getDelta();

player.rot-=input.mx*0.05;
player.mesh.rotation.y=player.rot;

let move=new THREE.Vector3(input.lx,0,input.ly)
.applyAxisAngle(new THREE.Vector3(0,1,0),player.rot);
player.mesh.position.add(move.multiplyScalar(0.3));

player.vY-=0.02;
player.mesh.position.y+=player.vY;
if(player.mesh.position.y<1){player.mesh.position.y=1;player.vY=0;player.jump=false}

let camPos=player.mesh.position.clone()
.add(new THREE.Vector3(0,4,8).applyAxisAngle(new THREE.Vector3(0,1,0),player.rot));
camera.position.lerp(camPos,0.1);
camera.lookAt(player.mesh.position);

bullets.forEach((b,i)=>{
b.mesh.position.add(b.dir.clone().multiplyScalar(1));
npcs.forEach((n,ni)=>{
if(b.mesh.position.distanceTo(n.position)<1){
scene.remove(n);
npcs.splice(ni,1);
scene.remove(b.mesh);
bullets.splice(i,1);
wanted++;
document.getElementById("wanted").innerText="🚨 "+wanted;
spawnNPC();
}
});
});

npcs.forEach(n=>{
n.lookAt(player.mesh.position);
n.translateZ(0.03);
if(n.position.distanceTo(player.mesh.position)<1.5){
player.hp-=0.1;
document.getElementById("hp").style.width=player.hp+"%";
}
});

if(player.hp<=0){
alert("VOCÊ MORREU");
location.reload();
}

renderer.render(scene,camera);
}

function startGame(){
document.getElementById("menu").style.display="none";
document.getElementById("hud").style.display="block";
document.getElementById("controls").style.display="block";
init();
}

document.getElementById("shoot").ontouchstart=shoot;
document.getElementById("jump").ontouchstart=()=>{
if(!player.jump){player.vY=0.4;player.jump=true}
};

document.getElementById("left").ontouchmove=e=>{
let t=e.touches[0];
input.lx=(t.clientX-innerWidth*0.25)/100;
input.ly=(t.clientY-innerHeight*0.75)/100;
};

document.getElementById("right").ontouchmove=e=>{
let t=e.touches[0];
input.mx=(t.clientX-innerWidth*0.75)/100;
};

window.onresize=()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
};
</script>
</body>
</html>
