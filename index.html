<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GTA Mobile - City Evolution</title>
    <style>
        /* --- ESTILOS --- */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; touch-action: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* HUD & UI */
        #hud { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; display: none; }
        .stat-bar { width: 160px; height: 12px; background: rgba(0,0,0,0.6); border: 2px solid #fff; border-radius: 6px; margin-bottom: 8px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: #2ecc71; transition: width 0.3s; }
        .text-ui { color: white; font-weight: bold; text-shadow: 2px 2px 2px #000; font-size: 1.2rem; margin-bottom: 4px; }

        /* Controles */
        #controls { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; display: none; }
        .joy-zone { position: absolute; width: 50%; height: 50%; bottom: 0; pointer-events: auto; }
        #left-zone { left: 0; } #right-zone { right: 0; }
        .stick-base { position: absolute; width: 80px; height: 80px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; transform: translate(-50%, -50%); display: none; }
        .stick-dot { position: absolute; width: 40px; height: 40px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.7; }
        
        .action-btn { position: absolute; width: 70px; height: 70px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 50%; pointer-events: auto; display: flex; justify-content: center; align-items: center; color: white; font-size: 28px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #btn-shoot { bottom: 110px; right: 30px; background: rgba(231, 76, 60, 0.7); }
        #btn-jump { bottom: 30px; right: 110px; background: rgba(52, 152, 219, 0.7); }
        #btn-v { bottom: 30px; left: 30px; background: rgba(46, 204, 113, 0.7); display: none; }

        /* Menu */
        #main-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; background: linear-gradient(to bottom, #1a1a2e, #16213e); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        h1 { font-size: 3rem; margin-bottom: 10px; color: #f1c40f; text-shadow: 3px 3px #000; }
        #start-btn { padding: 18px 50px; font-size: 1.5rem; background: #e74c3c; color: #fff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; box-shadow: 0 6px #c0392b; }
        #start-btn:active { box-shadow: 0 2px #c0392b; transform: translateY(4px); }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1>CITY EVOLUTION</h1>
        <p style="margin-bottom: 30px; opacity: 0.8;">Explore, Dirija e Sobreviva</p>
        <button id="start-btn">INICIAR</button>
    </div>

    <div id="hud">
        <div class="stat-bar"><div id="hp-fill"></div></div>
        <div class="text-ui" id="ammo-ui">🔫 30 / 30</div>
        <div class="text-ui" id="money-ui">💰 $ 0</div>
    </div>

    <div id="controls">
        <div id="left-zone" class="joy-zone"><div class="stick-base" id="joy-l"><div class="stick-dot"></div></div></div>
        <div id="right-zone" class="joy-zone"><div class="stick-base" id="joy-r"><div class="stick-dot"></div></div></div>
        <div id="btn-shoot" class="action-btn">💥</div>
        <div id="btn-jump" class="action-btn">⬆️</div>
        <div id="btn-v" class="action-btn">🚗</div>
    </div>

    <div id="game-canvas"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- CONFIGURAÇÃO INICIAL ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.shadowMap.enabled = true;
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('game-canvas').appendChild(renderer.domElement);

        // Luzes
        const ambient = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(50, 100, 50);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 1024;
        sun.shadow.mapSize.height = 1024;
        scene.add(sun);

        // --- SISTEMA DE CIDADE (RUAS E PRÉDIOS) ---
        const buildings = [];
        const streetLights = [];
        const worldSize = 400;

        function createCity() {
            // Chão Base (Grama/Terra)
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(worldSize, worldSize), new THREE.MeshStandardMaterial({color: 0x1a2e1a}));
            ground.rotation.x = -Math.PI/2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Sistema de Ruas (Grid)
            const roadMat = new THREE.MeshStandardMaterial({color: 0x222222});
            const lineMat = new THREE.MeshStandardMaterial({color: 0xf1c40f});

            for(let i = -2; i <= 2; i++) {
                // Estradas Norte-Sul
                const roadNS = new THREE.Mesh(new THREE.PlaneGeometry(20, worldSize), roadMat);
                roadNS.rotation.x = -Math.PI/2;
                roadNS.position.set(i * 80, 0.05, 0);
                roadNS.receiveShadow = true;
                scene.add(roadNS);

                // Faixas da Estrada
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.5, worldSize), lineMat);
                line.rotation.x = -Math.PI/2;
                line.position.set(i * 80, 0.07, 0);
                scene.add(line);

                // Estradas Leste-Oeste
                const roadEW = new THREE.Mesh(new THREE.PlaneGeometry(worldSize, 20), roadMat);
                roadEW.rotation.x = -Math.PI/2;
                roadEW.position.set(0, 0.05, i * 80);
                roadEW.receiveShadow = true;
                scene.add(roadEW);
            }

            // Prédios nos quarteirões
            for (let i = 0; i < 80; i++) {
                let x = (Math.random() - 0.5) * worldSize;
                let z = (Math.random() - 0.5) * worldSize;

                // Evita colocar prédios no meio da rua
                if (Math.abs(x % 80) < 15 || Math.abs(z % 80) < 15) continue;

                const h = 10 + Math.random() * 30;
                const bGeo = new THREE.BoxGeometry(12, h, 12);
                const bMat = new THREE.MeshStandardMaterial({
                    color: 0x3d3d3d,
                    emissive: 0xffaa00,
                    emissiveIntensity: 0 // Começa desligado (dia)
                });
                const b = new THREE.Mesh(bGeo, bMat);
                b.position.set(x, h/2, z);
                b.castShadow = true;
                b.receiveShadow = true;
                scene.add(b);
                buildings.push(b);

                // Adiciona Poste de Luz na calçada
                if (i % 2 === 0) createLamp(x + 8, z + 8);
            }
        }

        function createLamp(x, z) {
            const pole = new THREE.Group();
            const stick = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 8), new THREE.MeshStandardMaterial({color: 0x333333}));
            stick.position.y = 4;
            pole.add(stick);

            const bulb = new THREE.PointLight(0xffcc00, 0, 20); // Intensidade 0 no dia
            bulb.position.set(0, 8, 0);
            pole.add(bulb);

            const bulbMesh = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshBasicMaterial({color: 0x444444}));
            bulbMesh.position.set(0, 8, 0);
            pole.add(bulbMesh);

            pole.position.set(x, 0, z);
            scene.add(pole);
            streetLights.push({light: bulb, mesh: bulbMesh});
        }

        // --- ENTIDADES ---
        const player = {
            mesh: null,
            hp: 100,
            rotY: 0,
            vY: 0,
            isJumping: false,
            init() {
                this.mesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2.4, 1.2), new THREE.MeshStandardMaterial({color: 0x3498db}));
                this.mesh.position.y = 1.2;
                this.mesh.castShadow = true;
                scene.add(this.mesh);
            }
        };

        const car = {
            mesh: null,
            active: false,
            speed: 0,
            init() {
                const body = new THREE.Mesh(new THREE.BoxGeometry(3, 1.2, 5), new THREE.MeshStandardMaterial({color: 0x27ae60}));
                const roof = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.8, 2.5), new THREE.MeshStandardMaterial({color: 0x222222}));
                roof.position.y = 1;
                this.mesh = new THREE.Group();
                this.mesh.add(body);
                this.mesh.add(roof);
                this.mesh.position.set(15, 0.6, 15);
                scene.add(this.mesh);
            }
        };

        const npcs = [];
        function spawnNPC() {
            const n = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2.4, 1.2), new THREE.MeshStandardMaterial({color: 0xe74c3c}));
            // Garante que nasce no chão (y = 1.2)
            n.position.set((Math.random()-0.5)*150, 1.2, (Math.random()-0.5)*150);
            n.castShadow = true;
            scene.add(n);
            npcs.push({mesh: n, wanderDir: Math.random() * Math.PI * 2});
        }

        // --- INPUTS & CONTROLES ---
        const inputs = { move: {x:0, y:0}, look: {x:0, y:0} };
        function setupJoy(zoneId, type) {
            const zone = document.getElementById(zoneId);
            const base = zone.querySelector('.stick-base');
            const dot = zone.querySelector('.stick-dot');
            let tId = null;
            let sX, sY;

            zone.addEventListener('touchstart', e => {
                e.preventDefault();
                const t = e.changedTouches[0];
                tId = t.identifier;
                sX = t.clientX; sY = t.clientY;
                base.style.display = 'block';
                base.style.left = sX + 'px'; base.style.top = sY + 'px';
            });

            zone.addEventListener('touchmove', e => {
                e.preventDefault();
                for(let t of e.changedTouches) {
                    if(t.identifier === tId) {
                        let dx = t.clientX - sX;
                        let dy = t.clientY - sY;
                        let dist = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
                        let ang = Math.atan2(dy, dx);
                        inputs[type].x = (Math.cos(ang) * dist) / 40;
                        inputs[type].y = (Math.sin(ang) * dist) / 40;
                        dot.style.left = 40 + (Math.cos(ang) * dist) + 'px';
                        dot.style.top = 40 + (Math.sin(ang) * dist) + 'px';
                    }
                }
            });

            zone.addEventListener('touchend', e => {
                for(let t of e.changedTouches) if(t.identifier === tId) {
                    tId = null; base.style.display = 'none';
                    inputs[type].x = 0; inputs[type].y = 0;
                }
            });
        }

        // --- CICLO DIA/NOITE & LOOP ---
        let dayCycle = 0;
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            // Ciclo Dia/Noite (Lento)
            dayCycle += delta * 0.05; 
            let lightStrength = Math.sin(dayCycle) * 0.5 + 0.5; // 0 a 1
            sun.intensity = lightStrength;
            ambient.intensity = Math.max(0.1, lightStrength * 0.4);
            
            // Atmosfera
            const nightFactor = 1 - lightStrength;
            scene.background = new THREE.Color().setHSL(0.6, 0.4, lightStrength * 0.5);
            scene.fog = new THREE.Fog(scene.background, 20, 150);

            // Luzes da Cidade (Acendem à noite)
            const isNight = lightStrength < 0.3;
            buildings.forEach(b => b.material.emissiveIntensity = isNight ? 1.5 : 0);
            streetLights.forEach(s => {
                s.light.intensity = isNight ? 2 : 0;
                s.mesh.material.color.setHex(isNight ? 0xffffff : 0x444444);
            });

            if (!car.active) {
                // MOVIMENTO PLAYER
                player.rotY -= inputs.look.x * 0.05;
                player.mesh.rotation.y = player.rotY;

                const dir = new THREE.Vector3(inputs.move.x, 0, inputs.move.y).applyAxisAngle(new THREE.Vector3(0,1,0), player.rotY);
                player.mesh.position.add(dir.multiplyScalar(0.2));

                // Gravidade/Pulo
                player.vY -= 0.015;
                player.mesh.position.y += player.vY;
                if(player.mesh.position.y < 1.2) {
                    player.mesh.position.y = 1.2;
                    player.vY = 0;
                    player.isJumping = false;
                }

                // Câmera Suave
                const camGoal = player.mesh.position.clone().add(new THREE.Vector3(0, 4, 8).applyAxisAngle(new THREE.Vector3(0,1,0), player.rotY));
                camera.position.lerp(camGoal, 0.1);
                camera.lookAt(player.mesh.position.clone().add(new THREE.Vector3(0, 1, 0)));

                // Distância do Carro
                document.getElementById('btn-v').style.display = player.mesh.position.distanceTo(car.mesh.position) < 6 ? 'block' : 'none';
            } else {
                // MOVIMENTO CARRO
                car.speed = THREE.MathUtils.lerp(car.speed, -inputs.move.y * 0.8, 0.05);
                car.mesh.rotation.y -= inputs.move.x * 0.04 * (car.speed > 0 ? 1 : -1);
                car.mesh.translateZ(car.speed);

                const camGoal = car.mesh.position.clone().add(new THREE.Vector3(0, 6, 12).applyAxisAngle(new THREE.Vector3(0,1,0), car.mesh.rotation.y));
                camera.position.lerp(camGoal, 0.1);
                camera.lookAt(car.mesh.position);
            }

            // NPCs (Andando no chão)
            npcs.forEach(n => {
                n.mesh.translateZ(0.05);
                if(Math.random() > 0.98) n.mesh.rotation.y += (Math.random()-0.5);
                // Previne flutuar
                n.mesh.position.y = 1.2;
            });

            renderer.render(scene, camera);
        }

        // --- INICIALIZAÇÃO ---
        document.getElementById('start-btn').onclick = () => {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('controls').style.display = 'block';
            
            createCity();
            player.init();
            car.init();
            for(let i=0; i<15; i++) spawnNPC();
            
            setupJoy('left-zone', 'move');
            setupJoy('right-zone', 'look');
            animate();
        };

        // Botões de Ação
        document.getElementById('btn-jump').ontouchstart = () => {
            if(!player.isJumping && !car.active) {
                player.vY = 0.3;
                player.isJumping = true;
            }
        };

        document.getElementById('btn-v').ontouchstart = () => {
            car.active = !car.active;
            player.mesh.visible = !car.active;
            if(!car.active) player.mesh.position.copy(car.mesh.position).add(new THREE.Vector3(4, 1.2, 0));
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
